services:
  phpmyadmin:
    image: phpmyadmin:5-apache
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: database
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
      UPLOAD_LIMIT: 64M
    depends_on:
      database:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: always

  database:
    image: mariadb:11
    restart: always
    environment:
      MARIADB_DATABASE: appdb
      MARIADB_USER: appuser
      MARIADB_PASSWORD: apppass
      MARIADB_RANDOM_ROOT_PASSWORD: '1'
    volumes:
      - db-data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend1:
    build: ./backend
    expose:
      - "3000"
    environment:
      DB_HOST: database
      DB_USER: appuser
      DB_PASSWORD: apppass
      DB_NAME: appdb
      REDIS_HOST: redis
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules

  backend2:
    build: ./backend
    expose:
      - "3000"
    environment:
      DB_HOST: database
      DB_USER: appuser
      DB_PASSWORD: apppass
      DB_NAME: appdb
      REDIS_HOST: redis
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules

  backend3:
    build: ./backend
    expose:
      - "3000"
    environment:
      DB_HOST: database
      DB_USER: appuser
      DB_PASSWORD: apppass
      DB_NAME: appdb
      REDIS_HOST: redis
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules

  frontend:
    build: ./frontend
    expose:
      - "80"
    develop:
      watch:
        - path: ./frontend
          action: rebuild

  reverse-proxy:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend1
      - backend2
      - backend3

volumes:
  db-data:
