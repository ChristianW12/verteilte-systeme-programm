# Verteiltes Task Management System - Lokale Entwicklung und Produktion
# Services: 3x Backend, 1x Frontend, 1x Redis (Locks/Events), 1x MariaDB, 1x Nginx (LB), 1x WebSocket
services:
  phpmyadmin:
    image: phpmyadmin:5-apache
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: database
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
      UPLOAD_LIMIT: 64M
    depends_on:
      database:
        condition: service_healthy

  # Redis für Pessimistic Locking und Realtime Event Publishing
  redis:
    image: redis:7-alpine
    restart: always

  # MariaDB Datenbank mit Initialskript und Health Check
  database:
    image: mariadb:11
    restart: always
    environment:
      MARIADB_DATABASE: appdb
      MARIADB_USER: appuser
      MARIADB_PASSWORD: apppass
      MARIADB_RANDOM_ROOT_PASSWORD: '1'
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Backend Instance 1/3 - Node.js Express Server mit npm run dev
  backend1:
    build: ./backend
    expose:
      - "3000"
    command: npm run dev
    environment:
      DB_HOST: database
      DB_USER: appuser
      DB_PASSWORD: apppass
      DB_NAME: appdb
      REDIS_HOST: redis
      JWT_SECRET: dev-only-change-this-jwt-secret-32chars-min
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules

  # Backend Instance 2/3
  backend2:
    build: ./backend
    expose:
      - "3000"
    command: npm run dev
    environment:
      DB_HOST: database
      DB_USER: appuser
      DB_PASSWORD: apppass
      DB_NAME: appdb
      REDIS_HOST: redis
      JWT_SECRET: dev-only-change-this-jwt-secret-32chars-min
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules

  # Backend Instance 3/3 - horizontale Skalierung für Lastverteilung
  backend3:
    build: ./backend
    expose:
      - "3000"
    command: npm run dev
    environment:
      DB_HOST: database
      DB_USER: appuser
      DB_PASSWORD: apppass
      DB_NAME: appdb
      REDIS_HOST: redis
      JWT_SECRET: dev-only-change-this-jwt-secret-32chars-min
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules

  # Angular Frontend mit Nginx Reverse Proxy Integration
  frontend:
    build: ./frontend
    expose:
      - "80"
    develop:
      watch:
        - path: ./frontend
          action: rebuild

  # Nginx Load Balancer und Reverse Proxy (least_conn für Backend Pool)
  reverse-proxy:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend1
      - backend2
      - backend3

  # Temporärer öffentlicher Tunnel (TryCloudflare) auf den Reverse Proxy
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://reverse-proxy:80
    restart: unless-stopped
    depends_on:
      - reverse-proxy
  # Dedizierter WebSocket Server für Realtime Events (Redis Pub/Sub Subscriber)
  websockets:
    build: ./websockets
    expose:
      - "4000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CHANNEL: realtime.events
    depends_on:
      redis:
        condition: service_started
    volumes:
      - ./websockets:/usr/src/app
      - /usr/src/app/node_modules
