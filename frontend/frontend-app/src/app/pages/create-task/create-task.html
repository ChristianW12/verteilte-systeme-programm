<div class="flex justify-center pt-8 p-4">
    <div class="w-full max-w-md">
        <form action="" class="bg-white shadow-md rounded-lg p-6">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Neue Task erstellen</h2>
            
            <div class="mb-4">
                <label for="title" class="block text-gray-700 font-bold mb-2">Titel:</label>
                <input type="text" id="title" name="title" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600">
            </div>

            <div class="mb-4">
                <label for="description" class="block text-gray-700 font-bold mb-2">Beschreibung:</label>
                <textarea id="description" name="description" rows="4" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600"></textarea>
            </div>
        </form>
    </div>
</div>
