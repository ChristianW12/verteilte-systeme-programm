<div class="max-w-2xl mx-auto p-6">
  <button class="mb-4 text-sm text-blue-600 hover:underline" (click)="goBack()">← Zurück zum Dashboard</button>

  <div *ngIf="loading()" class="text-center text-gray-600">
    <p>Task wird geladen...</p>
  </div>

  <div *ngIf="error() && !loading()" class="text-center text-red-600">
    <p>{{ error() }}</p>
  </div>

  <div *ngIf="task() && !loading()" class="bg-white rounded-lg shadow-md p-6">
    <h1 class="text-3xl font-bold mb-4">{{ task()!.title }}</h1>

    <div class="grid grid-cols-2 gap-4 mb-4">
      <div>
        <label class="block text-sm font-semibold text-gray-700">Status:</label>
        <p class="text-lg text-gray-900">{{ task()!.status }}</p>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700">Priorität:</label>
        <p class="text-lg text-gray-900">{{ task()!.priority }}</p>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700">Bearbeiter:</label>
        <p class="text-lg text-gray-900">{{ task()!.assigned_to || 'Nicht zugewiesen' }}</p>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700">Deadline:</label>
        <p class="text-lg text-gray-900">{{ task()!.deadline ? (task()!.deadline | date:'dd.MM.yyyy') : 'Keine Deadline' }}</p>
      </div>
    </div>

    <div class="mb-4">
      <label class="block text-sm font-semibold text-gray-700 mb-2">Beschreibung:</label>
      <p class="text-gray-900 whitespace-pre-wrap">{{ task()!.description || '—' }}</p>
    </div>

    <div *ngIf="permissions().canEdit || permissions().canDelete" class="flex gap-3 mt-6">
      <button
        *ngIf="permissions().canEdit"
        class="px-4 py-2 rounded-md bg-blue-600 text-white hover:bg-blue-700"
        (click)="onEdit()"
      >
        Task bearbeiten
      </button>

      <button
        *ngIf="permissions().canDelete"
        class="px-4 py-2 rounded-md bg-red-600 text-white hover:bg-red-700"
        (click)="onDelete()"
      >
        Task löschen
      </button>
    </div>
  </div>
</div>
