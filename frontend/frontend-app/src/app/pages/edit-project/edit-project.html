<!--- TODO Es muss noch die ganzene Funktionalität implementiert werden, da sonst bei Docker fehler ausgeworfen werden-->
<section class="min-h-screen bg-slate-100 px-4 py-10">
	<div class="mx-auto w-full max-w-2xl rounded-2xl bg-white p-6 shadow-lg sm:p-8">
		<h1 class="text-2xl font-bold text-slate-900">Projekt bearbeiten</h1>
		<p class="mt-2 text-sm text-slate-600">
			Aktualisiere Projekttitel, Beschreibung und Mitglieder.
		</p>

		<form class="mt-6 space-y-5" (ngSubmit)="onSubmit()">
			<div>
				<label
					for="projectTitle"
					class="mb-2 block text-sm font-semibold text-slate-800"
				>
					Projekttitel
				</label>
				<input
					id="projectTitle"
					name="projectTitle"
					type="text"
					[(ngModel)]="projectTitle"
					placeholder="z. B. Verteilte Systeme Projekt"
					class="w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-900 placeholder:text-slate-400 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
				/>
			</div>

			<div>
				<label
					for="projectDescription"
					class="mb-2 block text-sm font-semibold text-slate-800"
				>
					Beschreibung
				</label>
				<textarea
					id="projectDescription"
					name="projectDescription"
					[(ngModel)]="projectDescription"
					rows="6"
					placeholder="Beschreibe kurz das Ziel und den Umfang des Projekts..."
					class="w-full resize-y rounded-xl border border-slate-300 px-4 py-3 text-slate-900 placeholder:text-slate-400 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
				></textarea>
			</div>

			<div>
				<label class="mb-2 block text-sm font-semibold text-slate-800">
					Mitglieder (E-Mail)
				</label>

				<div *ngFor="let field of memberFields; let i = index" class="mb-2 flex items-start gap-2">
					<div class="relative w-full">
						<input
							type="email"
							[name]="'memberEmail' + i"
							[(ngModel)]="field.email"
							(input)="onMemberInput(i)"
							(focus)="onMemberFocus(i)"
							(blur)="onMemberBlur(i)"
							placeholder="mitglied@example.com"
							class="w-full rounded-xl border border-slate-300 px-4 py-3"
							autocomplete="off"
						/>

						<ul
							*ngIf="field.showSuggestions"
							class="absolute z-10 mt-1 max-h-56 w-full overflow-y-auto rounded-xl border border-slate-200 bg-white shadow-lg"
						>
							<li
								*ngFor="let suggestion of field.suggestions"
								(mousedown)="selectSuggestion(i, suggestion)"
								class="cursor-pointer px-4 py-2 text-sm text-slate-800 hover:bg-slate-100"
							>
								{{ suggestion.email }}
							</li>
						</ul>
					</div>

					<select
						[name]="'memberRole' + i"
						[(ngModel)]="field.role"
						class="rounded-xl border border-slate-300 px-3 py-3 text-sm text-slate-800"
					>
						<option value="Admin">Admin</option>
						<option value="Developer">Developer</option>
						<option value="Viewer">Viewer</option>
					</select>

					<button
						type="button"
						(click)="removeMemberField(i)"
						class="rounded-xl bg-red-500 px-3 py-2 text-white"
					>
						X
					</button>
				</div>

				<button
					type="button"
					(click)="addMemberField()"
					class="mt-2 rounded-xl bg-slate-200 px-4 py-2"
				>
					+ Weiteres Mitglied
				</button>
			</div>

			<button
				type="submit"
				[disabled]="isSubmitting"
				class="inline-flex items-center rounded-xl bg-blue-600 px-5 py-3 text-sm font-semibold text-white transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-300"
			>
				{{ isSubmitting ? 'Speichere Änderungen...' : 'Änderungen speichern' }}
			</button>
		</form>
	</div>
</section>
