<div class="flex justify-center pt-8 p-4">
  <div class="w-full max-w-2xl">
    <div class="bg-white shadow-md rounded-lg p-6">
      <h2 class="text-2xl font-bold mb-6 text-gray-800">Mein Profil</h2>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">Benutzername</label>
          <p class="text-gray-900 bg-gray-50 px-3 py-2 rounded border border-gray-200">
            {{ username() }}
          </p>
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">E-Mail</label>
          <p class="text-gray-900 bg-gray-50 px-3 py-2 rounded border border-gray-200">
            {{ email() }}
          </p>
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">Mitglied seit</label>
          <p class="text-gray-900 bg-gray-50 px-3 py-2 rounded border border-gray-200">
            {{ memberSince() | date: 'dd. MMM yyyy' }}
          </p>
        </div>
      </div>
    </div>
    <div class="mt-4 flex flex-wrap justify-center gap-3">
      <button
        type="button"
        class="rounded-md border border-slate-300 bg-slate-50 px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100"
      >
        Profil bearbeiten
      </button>
      <button
        type="button"
        class="rounded-md border border-red-200 bg-red-50 px-4 py-2 text-sm font-semibold text-red-700 hover:bg-red-100"
      >
        Profil löschen
      </button>
      <button
        type="button"
        class="rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-semibold text-gray-700 hover:bg-gray-100"
        (click)="logout()"
      >
        Abmelden
      </button>
    </div>
  </div>
</div>
