<article class="group w-full max-w-md rounded-2xl border border-slate-200 bg-white p-5 shadow-sm transition hover:-translate-y-0.5 hover:shadow-md cursor-pointer">
  <div class="mb-4 flex items-start justify-between gap-3">
    <h3 class="text-lg font-semibold leading-tight text-slate-900 break-words line-clamp-3">{{ project().name }}</h3>
    @if (canUserEditProject()) {
      <button
        [routerLink]="['/project/edit', project().project_id]"
        (click)="$event.stopPropagation()"
        class="text-blue-500 hover:text-blue-700 cursor-pointer">
        🖋️
      </button>
    }
  </div>

  <div class="space-y-2 text-sm text-slate-700">
    <p class="flex items-center gap-2">
      <span class="font-semibold text-slate-900">Admin:</span>
      <span class="truncate">{{ project().created_by || 'Unbekannt' }}</span>
    </p>
  </div>
</article>
