<article class="group w-full max-w-md rounded-2xl border bg-white p-5 shadow-sm transition cursor-pointer relative"
         [class.border-slate-200]="!lockedBy()"
         [class.border-yellow-400]="lockedBy()"
         [class.bg-yellow-50]="lockedBy()">
  
  @if (lockedBy()) {
    <div class="absolute top-2 right-2 text-yellow-600 bg-white rounded-full p-1 shadow-sm border border-yellow-200" title="Gesperrt durch {{ lockedBy() }}">
      🔒
    </div>
  }

  <div class="mb-4 flex items-start justify-between gap-3">
    <h3 class="text-lg font-semibold leading-tight text-slate-900 hover:underline" [routerLink]="['/task', task().task_id]">{{ task().title }}</h3>
  </div>

  <div class="space-y-2 text-sm text-slate-700">
    <p class="flex items-center gap-2">
      <span class="font-semibold text-slate-900">Bearbeiter:</span>
      <span class="truncate">{{ task().assigned_to_email || 'Nicht zugewiesen' }}</span>
    </p>
    <p class="flex items-center gap-2">
      <span class="font-semibold text-slate-900">Deadline:</span>
      <time [attr.datetime]="task().deadline || null" class="rounded-md bg-slate-100 px-2 py-0.5 font-medium text-slate-800">
        {{ (task().deadline | date: 'dd.MM.yyyy') || 'Keine Deadline' }}
      </time>
    </p>
    
    @if (lockedBy()) {
      <div class="mt-2 pt-2 border-t border-yellow-200 text-[10px] text-yellow-700 font-medium">
        Bearbeitet von: {{ lockedBy() }}
      </div>
    }
  </div>
</article>
