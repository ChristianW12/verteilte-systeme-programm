# Load Balancer Konfiguration: Reverse Proxy für API (Least Conn), WebSocket, Frontend
events {}

http {
  # Backend Pool mit least_conn Load Balancing für 3 Instanzen
  upstream backend_pool {
	least_conn;
	server backend1:3000;
	server backend2:3000;
	server backend3:3000;
  }

  upstream frontend_pool {
	server frontend:80;
  }
  # WebSocket Pool mit /ws Routing und Upgrade-Headern
  upstream websocket_pool {
	server websockets:4000;
}

  server {
	listen 80;
	server_name _;

	# REST API Routing mit Lastverteilung
	location /api/ {
	  proxy_pass http://backend_pool;
	  proxy_http_version 1.1;
	  proxy_set_header Host $http_host;
	  proxy_set_header X-Forwarded-Host $http_host;
	  proxy_set_header X-Forwarded-Port $server_port;
	  proxy_set_header X-Real-IP $remote_addr;
	  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	  proxy_set_header X-Forwarded-Proto $scheme;
	}

	# WebSocket Upgrade mit longer timeout für persistente Verbindungen
	location /ws {
	  proxy_pass http://websocket_pool;
	  proxy_http_version 1.1;
	  proxy_set_header Host $http_host;
	  proxy_set_header X-Forwarded-Host $http_host;
	  proxy_set_header X-Forwarded-Port $server_port;
	  proxy_set_header X-Real-IP $remote_addr;
	  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	  proxy_set_header X-Forwarded-Proto $scheme;
	  proxy_set_header Upgrade $http_upgrade;
	  proxy_set_header Connection "upgrade";
	  proxy_read_timeout 600s;
	}

	# Frontend Fallback für Angular Routing
	location / {
	  proxy_pass http://frontend_pool;
	  proxy_http_version 1.1;
	  proxy_set_header Host $http_host;
	  proxy_set_header X-Forwarded-Host $http_host;
	  proxy_set_header X-Forwarded-Port $server_port;
	  proxy_set_header X-Real-IP $remote_addr;
	  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	  proxy_set_header X-Forwarded-Proto $scheme;
	}
  }
}

